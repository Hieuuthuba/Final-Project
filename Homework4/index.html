<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Interactive Photo Gallery</h1>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <div class="gallery">

        <img src="https://picsum.photos/id/1015/300/200"
             alt="Beautiful Mountain"
             onmouseover="upDate(this)"
             onmouseout="undo()">

        <img src="https://picsum.photos/id/1025/300/200"
             alt="Cute Dog"
             onmouseover="upDate(this)"
             onmouseout="undo()">

        <img src="https://picsum.photos/id/1035/300/200"
             alt="Green Forest"
             onmouseover="upDate(this)"
             onmouseout="undo()">

        <img src="https://picsum.photos/id/1043/300/200"
             alt="Ocean View"
             onmouseover="upDate(this)"
             onmouseout="undo()">

        <img src="https://picsum.photos/id/1069/300/200"
             alt="Snow Mountain"
             onmouseover="upDate(this)"
             onmouseout="undo()">

        <img src="https://picsum.photos/id/1074/300/200"
             alt="Lake Sunset"
             onmouseover="upDate(this)"
             onmouseout="undo()">

    </div>

<script src="script.js"></script>

</body>
</html>
